spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maxLifetime=240000
spring.datasource.hikari.maximumPoolSize=5

# true if we should run migration scripts
spring.flyway.enabled=true
spring.flyway.placeholders.storage-bucket=${STORAGE_BUCKET}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

nimnamfood.storage.project-id=${STORAGE_PROJECT_ID}
nimnamfood.storage.private-key-filename=storage-service-account-key-prod.json
nimnamfood.storage.bucket=${STORAGE_BUCKET}