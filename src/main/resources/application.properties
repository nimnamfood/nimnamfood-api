spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.storage-bucket=nimnamfood-dev.appspot.com

nimnamfood.storage.project-id=nimnamfood-dev
nimnamfood.storage.private-key-filename=nimnamfood-storage-service-account-key-dev.json
nimnamfood.storage.bucket=nimnamfood-dev.appspot.com
